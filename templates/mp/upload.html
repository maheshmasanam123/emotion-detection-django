{% extends "base.html" %}
{% block title %}Upload &middot; FaceMood{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="card-title mb-3">Upload a face photo</h2>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {{ form.image.label_tag }}
          {{ form.image }}
          {% if form.image.errors %}<div class="text-danger small mt-2">{{ form.image.errors }}</div>{% endif %}
          <button type="submit" class="btn btn-primary mt-3">Predict emotion</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
